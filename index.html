<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocRAG</title>
    <link rel="icon" href="./img/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" defer></script>
    <script src="app.js" defer></script>
</head>

<body>
    <div class="page">
        <div class="chat-shell" id="chatShell">
            <div class="intro" id="introSection">
                <div class="intro-badge">Intelligent Document QA</div>
                <h1>Ask and explore topics</h1>
                <p class="intro-desc">
                    Chat with your documents to find exact answers in seconds.
                </p>

                <div class="intro-guide">
                    <div class="guide-title">How to use</div>
                    <ul>
                        <li>Type a question about the document content</li>
                        <li>Click Send to search and generate an answer</li>
                        <li>Review the summary and matched chunks below</li>
                    </ul>
                </div>

                <div class="example-prompts">
                    <button class="example-btn" type="button" data-question="Summarize this document">
                        Summarize this document
                    </button>
                    <button class="example-btn" type="button" data-question="What are the key points?">
                        What are the key points?
                    </button>
                    <button class="example-btn" type="button" data-question="Who is Linda?">
                        Who is Linda?
                    </button>
                </div>
            </div>

            <div class="chat-history" id="chatHistory"></div>
        </div>
    </div>

    <div class="composer-wrap">
        <div class="composer">
            <input type="text" id="questionInput" placeholder="Ask a question about the document..." />
            <button id="sendBtn">
                <i class="fa-solid fa-paper-plane"></i>
                <span>Send</span>
            </button>
        </div>
    </div>
</body>

</html>
